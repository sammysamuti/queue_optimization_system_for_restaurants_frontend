name: Deploy with Docker Compose

on:
  push:
    branches: [ main ]

jobs:
  deploy-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: SSH into Server and Deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 25m
          timeout: 60s
          script: |
            set -euo pipefail

            echo "1. connected"
            APP_DIR="/app/queue-frontend"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "2. preparing ssh"
            mkdir -p "$HOME/.ssh"
            touch "$HOME/.ssh/known_hosts"
            grep -q github.com "$HOME/.ssh/known_hosts" || ssh-keyscan -t ed25519 github.com >> "$HOME/.ssh/known_hosts"

            echo "3. syncing repo"
            if [ ! -d ".git" ]; then
              git clone -b main git@github.com:sammysamuti/queue_optimization_system_for_restaurants_frontend.git .
            else
              git pull origin main
            fi

            echo "4. writing build stamp"
            mkdir -p build/web
            date +%s > build/web/version.json

            echo "5. writing env"
            cat <<EOF > .env
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            EOF


            docker compose  -f docker-compose.yml up -d --build

            echo "12. done"
