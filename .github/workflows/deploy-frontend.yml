name: Deploy Queue Optimization System for Restaurants Frontend

on:
  push:
    branches: [main]

jobs:
  deploy-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: SSH into Server and Deploy Frontend
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 25m
          timeout: 60s
          script: |
            set -euo pipefail

            # 1. Setup Directory
            APP_DIR="$HOME/queue-frontend"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # 2. Update Code via HTTPS
            if [ ! -d ".git" ]; then 
              git clone -b main git@github.com:sammysamuti/queue_optimization_system_for_restaurants_frontend.git .
            else 
              git fetch origin main
              git reset --hard origin/main
            fi

            # 3. Create Environment File
            # IMPORTANT: Ensure 'NEXT_PUBLIC_API_URL' is added to this Repo's Secrets
            cat <<'EOF' > .env
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            EOF

            # 4. Deployment Sequence
            # Using -f docker-compose.dev.yml to match your file naming
            docker compose -f docker-compose.dev.yml down --remove-orphans || true
            docker image prune -f || true

            echo "Building frontend containers..."
            docker compose -f docker-compose.dev.yml build --no-cache

            echo "Starting frontend..."
            docker compose -f docker-compose.dev.yml up -d
