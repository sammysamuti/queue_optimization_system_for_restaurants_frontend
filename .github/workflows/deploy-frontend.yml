name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy-main:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: SSH and Deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail

            # Fix 1: Use HOME directory to avoid "Permission Denied"
            APP_DIR="$HOME/queue-frontend"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # Fix 2: Use HTTPS to clone (avoids SSH key errors on the server)
            if [ ! -d ".git" ]; then 
              git clone -b main https://github.com/sammysamuti/queue_optimization_system_for_restaurants_frontend.git .
            else 
              git fetch origin main
              git reset --hard origin/main
            fi

            # Fix 3: Handle the .env file safely
            cat <<'EOF' > .env
            NEXT_PUBLIC_API_URL=${{ secrets.PROD_NEXT_PUBLIC_API_URL }}
            EOF

            # Fix 4: Deploy using Docker Compose
            docker compose -f docker-compose.dev.yml down || true
            docker image prune -f || true
            docker compose -f docker-compose.dev.yml build --no-cache
            docker compose -f docker-compose.dev.yml up -d
