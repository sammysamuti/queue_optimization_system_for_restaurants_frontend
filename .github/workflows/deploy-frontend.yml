name: Deploy Queue Optimization System for Restaurants Frontend with Docker Compose

on:
  push:
    branches: [main]

jobs:
  deploy-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: SSH into Server and Deploy Queue Optimization System for Restaurants Frontend
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 25m
          timeout: 60s
          script: |
            set -euo pipefail

            # Define directory
            APP_DIR="$HOME/queue-frontend"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # Use HTTPS for cloning
            if [ ! -d ".git" ]; then 
              git clone -b main https://github.com/sammysamuti/queue_optimization_system_for_restaurants_frontend.git .
            else git pull origin main; fi

            # Notice the quotes around 'EOF' - this is the magic fix
            cat <<'EOF' > .env
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}
            POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            CELERY_BROKER_URL=${{ secrets.CELERY_BROKER_URL }}
            CELERY_RESULT_BACKEND=${{ secrets.CELERY_RESULT_BACKEND }}
            API_TITLE=${{ secrets.API_TITLE }}
            API_VERSION=${{ secrets.API_VERSION }}
            ACCESS_TOKEN_LIFETIME=${{ secrets.ACCESS_TOKEN_LIFETIME }}
            REFRESH_TOKEN_LIFETIME=${{ secrets.REFRESH_TOKEN_LIFETIME }}
            EOF

            # Deployment Sequence
            docker compose down --remove-orphans || true
            docker image prune -f || true
            docker compose build --no-cache
            docker compose up -d
